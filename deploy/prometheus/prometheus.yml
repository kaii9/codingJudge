global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "/etc/prometheus/prometheus.rules.yml"

scrape_configs:
  - job_name: codingjudge-api
    static_configs:
      - targets: [api:8080]

  - job_name: codingjudge-worker
    dns_sd_configs:
      - names: [worker]
        type: A
        port: 9091
        refresh_interval: 5s
