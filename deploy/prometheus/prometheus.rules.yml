groups:
  - name: codingjudge
    rules:
      - record: codingjudge:http_requests:rate1m
        expr: sum(rate(codingjudge_http_requests_total[1m]))

      - record: codingjudge:http_5xx:ratio5m
        expr: sum(rate(codingjudge_http_requests_total{status_class="5xx"}[5m])) / clamp_min(sum(rate(codingjudge_http_requests_total[5m])), 1e-9)

      - record: codingjudge:http_duration:p95
        expr: histogram_quantile(0.95, sum by (le) (rate(codingjudge_http_request_duration_seconds_bucket[5m])))

      - record: codingjudge:worker_throughput:rate5m
        expr: sum(rate(codingjudge_worker_jobs_total[5m]))

      - record: codingjudge:worker_job_duration:p95
        expr: histogram_quantile(0.95, sum by (le) (rate(codingjudge_worker_job_duration_seconds_bucket[5m])))
