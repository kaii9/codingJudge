services:
  api:
    build: .
    command: ["/app/api"]
    environment:
      API_ADDR: ":8080"
      WORKER_URL: "http://worker:8081"
      DATABASE_URL: "postgres://codingjudge:codingjudge@postgres:5432/codingjudge?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    ports:
      - "18080:8080"
    depends_on:
      worker:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: ./frontend
    environment:
      API_INTERNAL_URL: "http://api:8080"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build: .
    command: ["/app/worker"]
    environment:
      WORKER_ADDR: ":8081"
      JUDGE_WORKDIR: "/tmp/codingjudge-sandbox"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/codingjudge-sandbox:/tmp/codingjudge-sandbox
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codingjudge
      POSTGRES_USER: codingjudge
      POSTGRES_PASSWORD: codingjudge
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codingjudge -d codingjudge"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
